name: Update IESO Demand Data

on:
  schedule:
    - cron: "0 8 * * *"   # Every day at 8am UTC (4am EST)
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Required to commit back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch latest IESO demand data
        run: python scripts/fetch_ieso.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ontario_electricity_demand.csv
          git diff --staged --quiet || git commit -m "chore: update IESO demand data [$(date -u '+%Y-%m-%d')]"
          git push